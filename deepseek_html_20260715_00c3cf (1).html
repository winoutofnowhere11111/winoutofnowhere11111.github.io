<!-- ============================================
     AI Search Section - Advanced RAG Search
     ============================================ -->
<div class="ai-search-section" style="margin: 30px 0; padding-top: 30px; border-top: 2px solid #e2e8f0;">
    <h2 style="text-align: center; color: #2d3748; margin-bottom: 10px;">
        <i class="fas fa-robot" style="color: #667eea;"></i> 
        AI-Powered Business Solution Search
    </h2>
    <p style="text-align: center; color: #718096; margin-bottom: 20px;">
        Get comprehensive solutions in English, Hindi, and German with AI
    </p>
    <div class="search-container" style="display: flex; gap: 10px; max-width: 100%;">
        <input 
            type="text" 
            id="aiSearchInput" 
            placeholder="Describe your business problem in detail..."
            class="search-input"
            style="flex: 1;"
        >
        <button id="aiSearchBtn" class="search-btn" style="white-space: nowrap;">
            <i class="fas fa-brain"></i> AI Search
        </button>
    </div>
    <div id="aiResults" style="margin-top: 20px; display: none;">
        <!-- AI results will be displayed here -->
    </div>
</div>
